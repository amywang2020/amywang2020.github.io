<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amy Jane Wang</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background: #f0efeb;
      --ink:        #1a1817;
      --ink-mid:    #6b6560;
      --font-main:  'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--background);
      color: var(--ink);
      font-family: var(--font-main);
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 52px 24px 32px;
      position: relative;
      z-index: 20;
    }
    .site-title {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--ink);
      display: inline-block;
      text-decoration: none;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: clamp(28px, 6vw, 88px);
      margin-top: 36px;
    }
    nav a {
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--ink);
      position: relative;
      padding-bottom: 3px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--ink-mid); }

    .stage {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 160px);
    }

    .scatter-photo {
      position: absolute;
      object-fit: cover;
      display: block;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .scatter-photo.loaded { opacity: 1; }

    .bio-cell {
      position: absolute;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .bio-cell.loaded { opacity: 1; }
    .bio-cell {
      overflow: hidden;
    }
    .bio-cell p {
      font-size: 0.72rem;
      font-weight: 400;
      line-height: 1.55;
      color: var(--ink);
      word-break: break-word;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>

<header>
  <a href="about.html" class="site-title">Amy Jane Wang</a>
  <nav>
    <a href="index.html">timeline</a>
    <a href="works.html">publications</a>
    <a href="https://www.linkedin.com/in/amjwang/" target="_blank">linkedin</a>
    <a href="https://amyjwang.substack.com/" target="_blank">substack</a>
  </nav>
</header>

<div class="stage" id="stage"></div>

<script>
  // ─── Add your photo filenames here ───────────────────────────
  const PHOTOS = [
    'photos/flower.png',
    'photos/photo.png',
    'photos/sunset.png',
    'photos/IMG_0224.png',
    'photos/IMG_1672.png',
    'photos/IMG_6374.png',
    'photos/IMG_6380.png',
    'photos/IMG_6532.jpeg',
    'photos/IMG_7670.jpeg',
    'photos/IMG_7813.jpeg',
    'photos/76ADE178-2869-4677-A409-647540AC0494.JPG',
    'photos/IMG_0130.jpeg',
    'photos/IMG_0232.jpeg',
    'photos/IMG_2167.jpeg',
    'photos/IMG_2396.jpeg',
    'photos/IMG_4798.jpeg',
    'photos/IMG_6921.jpeg',
    'photos/IMG_7382.jpeg',
    'photos/IMG_7515.jpeg',
    'photos/IMG_7928.jpeg',
    'photos/IMG_7964.jpeg',
    'photos/IMG_8240.jpeg',
    'photos/IMG_8242.jpeg',
  ];
  // ─────────────────────────────────────────────────────────────

  const G    = 14; // gap between photos (px)
  const COLS = 3;
  const ROWS = 3;

  const BIO = 'Hi, I\'m Amy. I\'m currently a junior at Stanford University — majoring in Symbolic Systems and minoring in Creative Writing.';

  let resizeTimer;

  function scatter() {
    const stage = document.getElementById('stage');
    stage.innerHTML = ''; // clear on each call

    // Measure the horizontal span of the nav items
    const navLinks  = document.querySelectorAll('nav a');
    const firstLink = navLinks[0].getBoundingClientRect();
    const lastLink  = navLinks[navLinks.length - 1].getBoundingClientRect();
    const navLeft   = firstLink.left;
    const navWidth  = lastLink.right - navLeft;

    // Cell size fits 3 columns within nav width; font scales with it
    const S        = Math.floor((navWidth - (COLS - 1) * G) / COLS);
    const fontSize = Math.max(9, Math.round(S * 0.072)) + 'px';

    // 9 cells: 1 bio + 1 blank + 1 pinned photo + 6 random others, all shuffled
    const pinned  = 'photos/photo.png';
    const pool    = PHOTOS.filter(p => p !== pinned).sort(() => Math.random() - 0.5).slice(0, COLS * ROWS - 3);
    const items   = ['bio', 'blank', pinned, ...pool].sort(() => Math.random() - 0.5);

    const gLeft = navLeft;
    const gTop  = 36;

    const punchedStars = [];

    items.forEach((item, i) => {
      const col  = i % COLS;
      const row  = Math.floor(i / COLS);
      const left = gLeft + col * (S + G);
      const top  = gTop  + row * (S + G);

      if (item === 'blank') {
        // empty cell — no element added, just a gap
      } else if (item === 'bio') {
        const cell = document.createElement('div');
        cell.className = 'bio-cell';
        cell.style.width  = S + 'px';
        cell.style.height = S + 'px';
        cell.style.left   = left + 'px';
        cell.style.top    = top  + 'px';
        const p = document.createElement('p');
        p.textContent = BIO;
        p.style.fontSize = fontSize;
        cell.appendChild(p);
        stage.appendChild(cell);
        requestAnimationFrame(() => cell.classList.add('loaded'));
      } else {
        // SVG wrapper so we can punch star-shaped holes via a mask
        const uid = `m${i}${Math.random().toString(36).slice(2,6)}`;
        const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svgEl.setAttribute('class', 'scatter-photo'); // setAttribute required for SVG elements
        svgEl.setAttribute('width',  S);
        svgEl.setAttribute('height', S);
        svgEl.style.left = left + 'px';
        svgEl.style.top  = top  + 'px';

        // Build mask: white rect (show photo) minus black stars (punch holes)
        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        const mask = document.createElementNS('http://www.w3.org/2000/svg', 'mask');
        mask.setAttribute('id', uid);
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('width', S); bg.setAttribute('height', S);
        bg.setAttribute('fill', 'white');
        mask.appendChild(bg);

        const numHoles = 1 + Math.floor(Math.random() * 2);
        for (let h = 0; h < numHoles; h++) {
          const r1     = S * 0.09;
          const r2     = r1 * 0.42;
          const hx     = S * (0.18 + Math.random() * 0.64);
          const hy     = S * (0.18 + Math.random() * 0.64);
          const rotDeg = Math.random() * 360;
          const hole   = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          hole.setAttribute('points', starPts(hx, hy, r1, r2, 5, rotDeg));
          hole.setAttribute('fill', 'black');
          mask.appendChild(hole);
          // Remember for scattered stars
          punchedStars.push({ x: left + hx, y: top + hy, r1, r2, rotDeg });
        }
        defs.appendChild(mask);
        svgEl.appendChild(defs);

        const imgEl = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        imgEl.setAttribute('width',  S);
        imgEl.setAttribute('height', S);
        imgEl.setAttribute('preserveAspectRatio', 'xMidYMid slice');
        imgEl.setAttribute('mask', `url(#${uid})`);
        imgEl.addEventListener('load', () => svgEl.classList.add('loaded'));
        imgEl.setAttribute('href', item);
        svgEl.appendChild(imgEl);
        stage.appendChild(svgEl);
      }
    });

    scatterStars(gLeft, gTop, S, punchedStars);
  }

  const BLUE = '#6aafd4';

  function starPts(cx, cy, r1, r2, n, rotDeg) {
    const rot = (rotDeg || 0) * Math.PI / 180;
    return Array.from({ length: n * 2 }, (_, i) => {
      const a = (i * Math.PI / n) - Math.PI / 2 + rot;
      const r = i % 2 === 0 ? r1 : r2;
      return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`;
    }).join(' ');
  }

  function scatterStars(gLeft, gTop, S, punchedStars) {
    const stage  = document.getElementById('stage');
    const gridH  = ROWS * (S + G) - G;
    const stageW = stage.offsetWidth || window.innerWidth;

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    Object.assign(svg.style, {
      position: 'absolute', left: '0', top: '0',
      width: stageW + 'px', height: (gTop + gridH + 80) + 'px',
      overflow: 'visible', pointerEvents: 'none', zIndex: '3',
    });
    stage.appendChild(svg);

    // Each punched hole becomes a scattered star displaced from its origin
    punchedStars.forEach(({ x, y, r1, r2, rotDeg }) => {
      const dist  = S * (0.4 + Math.random() * 1.8);
      const angle = Math.random() * Math.PI * 2;
      const sx    = x + Math.cos(angle) * dist;
      const sy    = y + Math.sin(angle) * dist;
      const sr1   = r1 * (0.75 + Math.random() * 0.5);
      const op    = (0.45 + Math.random() * 0.45).toFixed(2);

      const star = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      star.setAttribute('points', starPts(sx, sy, sr1, sr1 * 0.42, 5, rotDeg + (Math.random() - 0.5) * 25));
      if (Math.random() > 0.4) {
        star.setAttribute('fill', BLUE);
        star.setAttribute('opacity', op);
      } else {
        star.setAttribute('fill', 'none');
        star.setAttribute('stroke', BLUE);
        star.setAttribute('stroke-width', '1.1');
        star.setAttribute('opacity', op);
      }
      svg.appendChild(star);
    });
  }

  window.addEventListener('load', scatter);
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(scatter, 150);
  });
</script>

</body>
</html>
