<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amy Jane Wang</title>

  <style>
    /* ─────────────────────────────────────────────
       DESIGN SETTINGS — safe to edit
    ───────────────────────────────────────────── */
    :root {
      --background:   #f0efeb;   /* page background color */
      --ink:          #1a1817;   /* main text / line color */
      --ink-mid:      #6b6560;   /* secondary text color  */
      --ink-light:    #a09890;   /* year labels, faint text */
      --font-main:    'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ─────────────────────────────────────────────
       Base
    ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    a { color: inherit; text-decoration: none; }
    html  { scroll-behavior: smooth; }
    body  {
      background: var(--background);
      color: var(--ink);
      font-family: var(--font-main);
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────────
       Header
    ───────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 52px 24px 32px;
    }
    .site-title,
    .site-title:link,
    .site-title:visited,
    .site-title:hover,
    .site-title:active {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      text-decoration: none;
      color: var(--ink);
      display: inline-block;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: clamp(28px, 6vw, 88px);
      margin-top: 36px;
    }
    nav a {
      font-family: var(--font-main);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--ink);
      position: relative;
      padding-bottom: 3px;
      transition: color 0.2s;
    }
    nav a.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-bottom: 1.5px solid var(--ink);
    }
    nav a:hover { color: var(--ink-mid); }

    /* ─────────────────────────────────────────────
       Timeline section wrapper
    ───────────────────────────────────────────── */
    #timeline { padding: 20px 0 120px; }

    .tl-side-labels {
      display: flex;
      max-width: 900px;
      margin: 0 auto 12px;
      padding: 0 24px;
    }
    .label-literary {
      width: calc(50% - 80px);
      text-align: right;
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    .label-professional {
      margin-left: calc(50% + 80px);
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
    }

    /* Canvas: all entries + SVG live here */
    #tl-canvas {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ─────────────────────────────────────────────
       Entry cards
    ───────────────────────────────────────────── */
    .tl-entry {
      position: absolute;
      width: 270px;
    }
    .tl-entry.literary {
      right: calc(50% + 80px);
      text-align: right;
    }
    .tl-entry.professional {
      left: calc(50% + 80px);
      text-align: left;
    }

    .entry-year {
      display: block;
      font-family: var(--font-main);
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--ink-light);
      margin-bottom: 3px;
    }
    .entry-title {
      font-family: var(--font-main);
      font-size: 0.88rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .tl-entry.literary .entry-title {
      color: #6aafd4;
    }
    .entry-desc {
      font-family: var(--font-main);
      font-size: 0.82rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--ink-mid);
      margin-top: 2px;
    }

    /* Photo */
    .photo-wrap {
      display: inline-block;
      margin-top: 10px;
    }
    .tl-entry.literary    .photo-wrap { transform: rotate(-2deg); }
    .tl-entry.professional .photo-wrap { transform: rotate(1.5deg); }

    .photo-wrap img {
      display: block;
      width: 175px;
      height: 125px;
      object-fit: cover;
      /* no border — clean like the reference */
    }

    /* X-box placeholder shown when no photo is provided */
    .photo-placeholder {
      width: 175px;
      height: 125px;
      border: 1px solid var(--ink-light);
      position: relative;
      display: block;
    }
    .photo-placeholder svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Items list (awards / publications) */
    .entry-items {
      margin-top: 5px;
      list-style: none;
      padding: 0;
    }
    .entry-items li {
      font-size: 0.72rem;
      font-weight: 300;
      line-height: 1.65;
      color: var(--ink-mid);
    }
    .entry-items li.item-hidden { display: none; }

    .entry-more {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--ink-light);
      margin-top: 4px;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .entry-more:hover {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    /* Annotation */
    .entry-annotation {
      display: inline-block;
      font-family: var(--font-main);
      font-size: 0.82rem;
      color: var(--ink-mid);
      margin-top: 5px;
    }
    .tl-entry.literary    .entry-annotation { transform: rotate(-1.2deg); }
    .tl-entry.professional .entry-annotation { transform: rotate(0.9deg);  }

    @keyframes tlFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .tl-reveal {
      animation: tlFadeIn 0.5s ease forwards;
    }

    /* ─────────────────────────────────────────────
       Works / CV stubs
    ───────────────────────────────────────────── */
    .stub-section {
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 32px 120px;
      text-align: center;
    }
    .stub-section h2 {
      font-family: var(--font-main);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .stub-section p {
      font-family: var(--font-main);
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--ink-mid);
      line-height: 1.9;
    }
    .stub-section a { color: var(--ink); }

    /* ─────────────────────────────────────────────
       Works page
    ───────────────────────────────────────────── */
    .works-content {
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 32px 120px;
    }
    .works-content > h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 52px;
    }
    .works-group { margin-bottom: 36px; }
    .works-group-year {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 10px;
    }
    .works-item {
      display: flex;
      flex-direction: column;
      padding: 7px 0;
      border-bottom: 1px solid rgba(39,35,32,0.08);
    }
    .works-item:last-child { border-bottom: none; }
    .works-item-title {
      font-size: 0.95rem;
      font-style: italic;
      font-weight: 400;
    }
    .works-item-venue {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--ink-mid);
      margin-top: 1px;
    }
    .works-item-note {
      font-size: 0.68rem;
      color: var(--ink-light);
      margin-top: 1px;
    }

    /* CV download link */
    .cv-download {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
      text-decoration: none;
      padding-bottom: 2px;
      transition: opacity 0.15s;
    }
    .cv-download:hover { opacity: 0.5; }
  </style>
</head>

/* ╔══════════════════════════════════════════════════════════════╗

/* ╔══════════════════════════════════════════════════════════════╗
   ║  LAYOUT SETTINGS                                            ║
   ╚══════════════════════════════════════════════════════════════╝ */

const SETTINGS = {
  padTop:       70,   // px before first entry
  padBottom:   100,   // px after last entry
  minRowGap:   120,   // minimum vertical gap between entries on the same side
  branchLen:    75,   // px the horizontal tick extends from center
  dotDiameter:   8,   // px diameter of dot on center line
  previewItems:  3,   // how many list items to show before "...and N more"
};

/* ─── Everything below this line runs automatically ──────────── */

TIMELINE.sort((a, b) => a.year - b.year);

const SVG_W = 220;
const CX    = SVG_W / 2;

// Assign lineX offsets by order (independent of y, so stable across re-renders)
TIMELINE.filter(i => i.side === 'literary')
  .forEach((item, i) => { item.lineX = CX + ((i % 2 === 0) ? -14 : 14); });
TIMELINE.filter(i => i.side === 'professional')
  .forEach(item => { item.lineX = CX; });

function buildEntryHTML(item) {
  let html = '';
  if (item.title) html += `<div class="entry-title">${item.title}</div>`;
  if (item.desc)  html += `<div class="entry-desc">${item.desc}</div>`;
  if (item.items && item.items.length > 0) {
    html += '<ul class="entry-items">';
    item.items.forEach((it, idx) => {
      const hidden = idx >= SETTINGS.previewItems ? ' item-hidden' : '';
      html += `<li class="${hidden}">${it}</li>`;
    });
    html += '</ul>';
    if (item.items.length > SETTINGS.previewItems) {
      const extra = item.items.length - SETTINGS.previewItems;
      html += `<span class="entry-more">+ ${extra} more</span>`;
    }
  }
  if (item.photo === 'placeholder') {
    html += `<div class="photo-wrap"><div class="photo-placeholder">
      <svg viewBox="0 0 175 125" xmlns="http://www.w3.org/2000/svg" fill="none">
        <line x1="2" y1="2" x2="173" y2="123" stroke="#a09890" stroke-width="1"/>
        <line x1="173" y1="2" x2="2" y2="123" stroke="#a09890" stroke-width="1"/>
      </svg></div></div>`;
  } else if (item.photo) {
    html += `<div class="photo-wrap"><img src="${item.photo}" alt="${item.title}" loading="lazy"></div>`;
  }
  if (item.annotation) html += `<span class="entry-annotation">${item.annotation}</span>`;
  return html;
}

function starPts(cx, cy, outerR, innerR, n, rotDeg) {
  const rot = (rotDeg || 0) * Math.PI / 180;
  const pts = [];
  for (let i = 0; i < n * 2; i++) {
    const angle = (i * Math.PI / n) - Math.PI / 2 + rot;
    const r = i % 2 === 0 ? outerR : innerR;
    pts.push([cx + r * Math.cos(angle), cy + r * Math.sin(angle)]);
  }
  return pts;
}

let scrollHandler = null;
let resizeTimer;

function render() {
  const canvas = document.getElementById('tl-canvas');
  canvas.innerHTML = '';

  // Apply nav margins
  const navLinks = document.querySelectorAll('nav a');
  const navLeft  = navLinks[0].getBoundingClientRect().left;
  const navRight = navLinks[navLinks.length - 1].getBoundingClientRect().right;
  const navWidth = navRight - navLeft;
  canvas.style.width       = navWidth + 'px';
  canvas.style.maxWidth    = navWidth + 'px';
  canvas.style.marginLeft  = navLeft + 'px';
  canvas.style.marginRight = '0';

  const entryWidth = Math.max(80, Math.floor(navWidth / 2 - SETTINGS.branchLen - 10));

  // ── Pass 1: create entries invisibly so we can measure their heights ──
  const entryElems = new Map();
  for (const item of TIMELINE) {
    const el = document.createElement('div');
    el.className    = `tl-entry ${item.side}`;
    el.style.width  = entryWidth + 'px';
    el.style.top    = '0px';
    el.style.visibility = 'hidden';
    if (item.side === 'professional') {
      el.style.left  = `calc(50% + ${(item.lineX - CX) + SETTINGS.branchLen + 5}px)`;
    } else {
      el.style.right = `calc(50% + ${SETTINGS.branchLen + 5}px)`;
    }
    el.innerHTML = buildEntryHTML(item);
    canvas.appendChild(el);
    entryElems.set(item, el);
  }

  // ── Pass 2: measure heights, compute non-overlapping y positions ──
  const GAP      = 28; // px between bottom of one entry and top of next
  const YEAR_GAP = 32; // extra px between year groups
  const byYear = {};
  TIMELINE.forEach(e => {
    if (!byYear[e.year]) byYear[e.year] = { literary: [], professional: [] };
    byYear[e.year][e.side].push(e);
  });
  const sortedYears = Object.keys(byYear).map(Number).sort((a, b) => a - b);

  let litY = SETTINGS.padTop;
  let proY = SETTINGS.padTop;
  const yearPositions = [];

  for (const year of sortedYears) {
    const lit = byYear[year].literary;
    const pro = byYear[year].professional;
    const extra = yearPositions.length > 0 ? YEAR_GAP : 0;
    const yearY = Math.max(litY, proY) + extra;
    yearPositions.push({ year, y: yearY });
    const proOffset = lit.length > 0 ? 65 : 0;

    let y = Math.max(litY, yearY);
    for (const item of lit) {
      item.y = y;
      const h = entryElems.get(item).getBoundingClientRect().height;
      y += Math.max(h + 8, h + GAP + (item.extraGap || 0));
    }
    if (lit.length > 0) litY = y;

    y = Math.max(proY, yearY + proOffset);
    for (const item of pro) {
      item.y = y;
      const h = entryElems.get(item).getBoundingClientRect().height;
      y += Math.max(h + 8, h + GAP + (item.extraGap || 0));
    }
    if (pro.length > 0) proY = y;
  }

  const totalHeight = Math.max(litY, proY) + SETTINGS.padBottom;
  canvas.style.height = totalHeight + 'px';

  // ── Pass 3: position entries at computed y values and show them ──
  for (const item of TIMELINE) {
    const el    = entryElems.get(item);
    const delay = (item.y / 1000).toFixed(2);
    el.style.top        = (item.y + 14) + 'px';
    el.style.visibility = '';
    el.style.opacity = '0';

    const moreBtn = el.querySelector('.entry-more');
    if (moreBtn) {
      moreBtn.addEventListener('click', () => {
        el.querySelectorAll('.item-hidden').forEach(li => li.classList.remove('item-hidden'));
        moreBtn.remove();
      });
    }
  }

  // ── Draw rough SVG ────────────────────────────────────────────
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width',  SVG_W);
  svg.setAttribute('height', totalHeight);
  Object.assign(svg.style, {
    position: 'absolute', top: '0', left: '50%',
    transform: 'translateX(-50%)', overflow: 'visible', pointerEvents: 'none',
  });
  canvas.appendChild(svg);

  const rc       = rough.svg(svg);
  const INK      = '#272320';
  const LIT_BLUE = '#6aafd4';
  const svgNS    = 'http://www.w3.org/2000/svg';

  const lineEnd = totalHeight - SETTINGS.padBottom + 20;

  svg.appendChild(rc.line(
    CX, SETTINGS.padTop - 20, CX, lineEnd,
    { stroke: INK, strokeWidth: 1.2, roughness: 0.4, bowing: 0 }
  ));

  const litItems = TIMELINE.filter(i => i.side === 'literary').sort((a, b) => a.y - b.y);
  if (litItems.length > 0) {
    const pts = [[CX, litItems[0].y - 40]];
    litItems.forEach(item => pts.push([item.lineX, item.y + 23]));
    pts.push([CX, lineEnd]);
    for (let pass = 0; pass < 3; pass++) {
      const stroke = rc.curve(pts, {
        stroke: LIT_BLUE, strokeWidth: 5, roughness: 2.8,
        bowing: 0.5, disableMultiStroke: true,
      });
      stroke.style.opacity = '0.42';
      svg.appendChild(stroke);
    }
  }

  // Ellipsis dots at the bottom of both lines
  for (let i = 0; i < 3; i++) {
    const dotY = lineEnd + 12 + i * 9;
    svg.appendChild(rc.circle(CX, dotY, 3,
      { stroke: INK, strokeWidth: 0.8, fill: INK, fillStyle: 'solid', roughness: 0.6 }));
    svg.appendChild(rc.circle(CX, dotY, 3,
      { stroke: LIT_BLUE, strokeWidth: 0.8, fill: LIT_BLUE, fillStyle: 'solid', roughness: 0.6 }));
  }

  for (const { year, y } of yearPositions) {
    const label = document.createElementNS(svgNS, 'text');
    label.setAttribute('x', CX + 14);
    label.setAttribute('y', y + 4);
    label.setAttribute('text-anchor', 'start');
    label.setAttribute('font-family', "'Helvetica Neue', Helvetica, Arial, sans-serif");
    label.setAttribute('font-size', '22');
    label.setAttribute('font-style', 'italic');
    label.setAttribute('letter-spacing', '0.5');
    label.setAttribute('fill', '#a09890');
    label.textContent = year;
    svg.appendChild(label);
  }

  const starMarkers = [];
  let starIdx = 0;
  for (const item of TIMELINE) {
    const y     = item.y + 23;
    const dir   = item.side === 'literary' ? -1 : 1;
    const color = item.side === 'literary' ? LIT_BLUE : INK;
    const bg    = item.side === 'literary' ? '#eef6fb' : '#f0efeb';
    const starX = item.lineX || CX;
    const delay = (item.y / 1000).toFixed(2);
    const rotDeg = (starIdx++ * 19) % 45;

    const tickLen = item.side === 'literary'
      ? item.lineX - CX + SETTINGS.branchLen
      : SETTINGS.branchLen;
    const tick = rc.line(starX, y, starX + dir * tickLen, y,
      { stroke: color, strokeWidth: 1.0, roughness: 0.5, bowing: 0 });
    svg.appendChild(tick);

    const star = rc.polygon(starPts(starX, y, 14, 6, 5, rotDeg),
      { stroke: color, strokeWidth: 1.0, fill: bg, fillStyle: 'solid', roughness: 0.8 });
    star.style.transition = 'filter 0.25s ease';
    svg.appendChild(star);
    starMarkers.push({ el: star, svgY: y });
  }

  starMarkers.sort((a, b) => a.svgY - b.svgY);

  if (scrollHandler) window.removeEventListener('scroll', scrollHandler, { passive: true });
  scrollHandler = function updateGlow() {
    const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
    const t   = Math.max(0, Math.min(1, window.scrollY / maxScroll));
    const idx = Math.round(t * (starMarkers.length - 1));
    const closest = starMarkers[idx].el;
    for (const { el } of starMarkers) {
      el.style.filter = el === closest
        ? 'drop-shadow(0 0 3px #ffd700) drop-shadow(0 0 10px #ffd700) drop-shadow(0 0 20px #ffaa00)'
        : '';
    }
  };
  window.addEventListener('scroll', scrollHandler, { passive: true });
  scrollHandler();
}

let tlObserver = null;

function setupObserver() {
  if (tlObserver) tlObserver.disconnect();
  const targets = document.querySelectorAll('.tl-entry');
  tlObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('tl-reveal');
        entry.target.style.opacity = '';
        tlObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.01 });
  targets.forEach(el => tlObserver.observe(el));
}

let lastRenderWidth = 0;
window.addEventListener('load', () => { lastRenderWidth = window.innerWidth; render(); setupObserver(); });
window.addEventListener('resize', () => {
  if (window.innerWidth === lastRenderWidth) return;
  lastRenderWidth = window.innerWidth;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { render(); setupObserver(); }, 150);
});

</script>
</body>
</html>
